# Framework Tier Defaults — Project Lumina
#
# Defines the built-in privilege tier ladder that every domain pack inherits.
# Domain packs declare their own role aliases in their runtime-config
# domain_roles block, mapping pack-local names onto these tier IDs.
#
# Design principle (IRC model): the framework owns the tier ladder; each
# domain pack owns its own governance declaration. No domain pack role name
# leaks into another pack or into the framework itself.
#
# tier_level: lower = more privileged (0 = highest)
# default_access: permission chars (r=read, w=write, x=execute, i=ingest)
#
# version: 2.0.0
# last_updated: 2026-04-21

framework_tier_defaults:
  - role_id: supervisor
    label: Supervisor
    tier_level: 0
    description: "Domain-level authority. Full read/write/execute/ingest access within their governed scope. Manages participants, standing orders, module assignments, and escalation resolution for the domain pack."
    default_access: rwxi

  - role_id: employee
    label: Employee
    tier_level: 1
    description: "Active participant with contribution rights. Can author artefacts, run sessions, and modify content within permitted modules. Write access is granted where explicitly declared."
    default_access: rwx

  - role_id: user_member
    label: User Member
    tier_level: 2
    description: "Standard participant. Can execute sessions and read content on modules they are enrolled in. No write or ingest access by default."
    default_access: rx

  - role_id: guest
    label: Guest
    tier_level: 3
    description: "Unauthenticated or unregistered visitor. Minimal read-only access, subject to each domain pack min_tier and guest_access policy."
    default_access: r
