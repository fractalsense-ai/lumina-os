# ─── Template Domain — Runtime Configuration ─────────────────────────
# This is the most important file in a domain pack.  The runtime loader
# reads it at startup to locate prompts, adapters, profiles, and physics.
#
# REQUIRED KEYS (runtime loader rejects the pack without these):
#   - domain_system_prompt_path
#   - turn_interpretation_prompt_path
#   - domain_physics_path
#   - subject_profile_path
#   - default_task_spec
#
# REQUIRED ADAPTERS (must appear in the top-level `adapters:` block):
#   - state_builder   — builds initial session state from a profile
#   - domain_step     — runs one domain tick (state × evidence → new state + decision)
#   - turn_interpreter — calls the LLM to parse raw user text into evidence
#
# HOW TO USE:
#   1. Replace every path containing "template" with your domain's directory.
#   2. Replace placeholder values marked with TODO.
#   3. Add modules to the module_map as you create them.
# ──────────────────────────────────────────────────────────────────────

# version: 1.0.0
# last_updated: 2026-04-17

runtime:
  # ── Required prompt paths ─────────────────────────────────────────
  # The global system prompt is shared across all domains; do not change it.
  global_system_prompt_path: docs/5-standards/global-system-prompt.md

  # TODO: Points to your domain persona prompt.
  domain_system_prompt_path: domain-packs/template/prompts/domain-persona-v1.md

  # TODO: Points to your turn interpretation spec (the schema the SLM must emit).
  turn_interpretation_prompt_path: domain-packs/template/domain-lib/reference/turn-interpretation-spec-v1.md

  # ── Required data paths ───────────────────────────────────────────
  # Default domain-physics file — used when no module override applies.
  # TODO: Update to your default module's physics file.
  domain_physics_path: domain-packs/template/modules/example-module/domain-physics.json

  # Default entity profile — loaded for new sessions.
  # TODO: Update to your entity profile.
  subject_profile_path: domain-packs/template/profiles/entity.yaml

  # ── Hierarchical profile templates (Base → Domain → Role) ────────
  # The base profile is in the system pack; every domain extends it.
  base_profile_path: domain-packs/system/cfg/base-entity-profile.yaml
  domain_profile_extension_path: domain-packs/template/cfg/domain-profile-extension.yaml

  # Profile templates per role.  The runtime merges:
  #   base-entity-profile → domain-profile-extension → role profile
  # TODO: Add one entry per domain role.
  profile_templates:
    default: domain-packs/template/profiles/entity.yaml
    # TODO: Add role-specific profiles as you define domain roles:
    # manager: domain-packs/template/profiles/manager.yaml
    # operator: domain-packs/template/profiles/operator.yaml

  # ── SLM weight overrides ──────────────────────────────────────────
  # Reclassify prompt types for SLM vs LLM routing.
  # "low" = prefer SLM (cheaper, faster). "high" = force LLM (better quality).
  # Omit this block entirely to accept framework defaults.
  slm_weight_overrides:
    turn_interpretation: low

  # ── Module Map ────────────────────────────────────────────────────
  # Maps fully-qualified module IDs to their configuration.
  # Format: domain/<short>/<module-name>/v<major>
  #
  # Each entry can override:
  #   - domain_physics_path        (required — the module's physics file)
  #   - domain_system_prompt_path  (optional — module-specific persona)
  #   - turn_interpretation_prompt_path (optional — module-specific schema)
  #   - initial_module_state       (optional — default state for new sessions)
  #   - default_task_spec          (optional — module-level task spec)
  #   - turn_input_defaults        (optional — fallback evidence values)
  #   - adapters                   (optional — override any of the 3 required + optional adapters)
  #   - ui_overrides               (optional — frontend display customisation)
  #   - local_only                 (optional — true for admin/governance modules)
  #
  # TODO: Replace "tmpl" with your domain short code.
  module_map:
    domain/tmpl/example-module/v1:
      # Thin stub — full config lives in modules/example-module/module-config.yaml.
      # Any keys set inline here take precedence over the sidecar file.
      module_path: domain-packs/template/modules/example-module

  # ── Access Control ────────────────────────────────────────────────
  # System-level RBAC gate.  The runtime checks this before routing.
  # TODO: Adjust roles to match your deployment.
  access_control:
    required_role: user
    allowed_roles:
      - root
      - domain_authority
      - it_support
      - qa
      - user

  # ── Default Task Spec ─────────────────────────────────────────────
  # Fallback task spec when a module doesn't declare its own.
  # TODO: Replace with a meaningful task for your domain.
  default_task_spec:
    task_id: example-task-001
    nominal_difficulty: 0.4
    skills_required:
      - observe
      - report

  # ── Domain Step Parameters ────────────────────────────────────────
  # Passed to your domain_step callable in the `params` dict.
  # TODO: Adjust to your domain's needs.
  domain_step_params:
    window_turns: 5
    drift_threshold: 0.4

  # ── Turn Input Schema ─────────────────────────────────────────────
  # Documents the evidence fields your turn interpreter emits.
  # The runtime uses this for validation and UI form generation.
  # TODO: Define every field your turn-interpretation spec outputs.
  turn_input_schema:
    on_track:
      type: bool
      default: true
      description: "Whether the entity's response is on-task."
    response_latency_sec:
      type: float
      minimum: 0.0
      default: 5.0
      description: "Seconds between prompt display and entity response."
    off_task_ratio:
      type: float
      minimum: 0.0
      maximum: 1.0
      default: 0.0
      description: "Fraction of message content that is off-topic."

  # ── Action → Prompt Type Map ──────────────────────────────────────
  # Maps standing-order action names to prompt_type values the persona
  # prompt recognises.  Omit for actions whose name matches the prompt type.
  action_prompt_type_map:
    request_more_detail: more_detail_request

  # ── Deterministic Templates ───────────────────────────────────────
  # Fallback response templates used when the system runs in local
  # validation mode (no LLM).  {task_id} is interpolated at runtime.
  deterministic_templates:
    task_presentation: "Proceed with {task_id}."
    more_detail_request: "Please provide more detail for {task_id}."
    default: "Continue with {task_id}."

# ── Adapter Bindings ──────────────────────────────────────────────────
# Top-level adapter block.  The runtime loader requires all three.
# Module-level overrides in module_map.adapters take precedence.
adapters:
  state_builder:
    module_path: domain-packs/template/controllers/runtime_adapters.py
    callable: build_initial_state
  domain_step:
    module_path: domain-packs/template/controllers/runtime_adapters.py
    callable: domain_step
  turn_interpreter:
    module_path: domain-packs/template/controllers/runtime_adapters.py
    callable: interpret_turn_input

# ── Optional Adapter Hooks ────────────────────────────────────────────
# Uncomment any of these to wire additional lifecycle hooks.
# Each must point to a module_path + callable.
#
#   nlp_pre_interpreter:     Phase A deterministic extraction (runs before LLM)
#   pre_turn_resume:         Restore session state before each turn
#   post_turn_processor:     Side effects after each turn (logging, analytics)
#   post_turn_timer:         Performance timing hook
#   profile_serializer:      Custom profile save/load logic
#   turn_0_presenter:        Custom first-turn greeting
#   escalation_context:      Build extra context for escalation packets
#   slm_normalizer:          Normalise SLM output before evidence merge
#   task_initializer:        Generate/select the next task (problem, prompt, etc.)
#   tools:                   Register deterministic tool functions
#   api_routes:              Register domain-specific API endpoints
#   operation_handlers:      Register slash-command operation handlers
