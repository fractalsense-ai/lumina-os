# ─── Example Module — Domain Physics (YAML source) ───────────────────
# This is the human-editable source of truth.  Convert to JSON before
# the runtime can load it:
#
#   python -c "import yaml, json, sys; \
#     json.dump(yaml.safe_load(open(sys.argv[1])), \
#     open(sys.argv[1].replace('.yaml','.json'),'w'), indent=2)" \
#     domain-packs/template/modules/example-module/domain-physics.yaml
#
# SCHEMA:  standards/domain-physics-schema-v1.json
# REQUIRED SECTIONS: id, version, domain_authority, meta_authority_id,
#                    invariants (≥1), standing_orders (≥1),
#                    escalation_triggers (≥1), artifacts
#
# TODO: Replace all placeholder values with your domain's real rules.
# ──────────────────────────────────────────────────────────────────────

# version: 1.0.0
# last_updated: 2026-04-17

# ── Identity ─────────────────────────────────────────────────────────
# Format: domain/<org-short>/<module-name>/v<major>
# TODO: Replace "tmpl" with your domain short code.
id: domain/tmpl/example-module/v1
version: "0.1.0"

# TODO: Replace with the human Domain Authority for this domain.
domain_authority:
  name: "Domain Lead"
  role: "Domain Authority"
  pseudonymous_id: "da_template_001"

# TODO: Set to the parent domain's ID, or "root" for top-level packs.
meta_authority_id: root

description: "Template example module — demonstrates the minimum viable domain physics structure."
department: "General"
lumina_core_version: "1.0.0"

# ── Invariants ───────────────────────────────────────────────────────
# Rules the orchestrator checks every turn.  At least one is required.
#
# severity:
#   critical — halts autonomous action, may trigger immediate escalation
#   warning  — triggers a standing order (automated bounded response)
#
# check:  A predicate expression evaluated against the evidence dict.
#         Use field names from your turn_input_schema.
#
# handled_by:  (optional) Delegate evaluation to a named subsystem
#              instead of the orchestrator's built-in check evaluator.
#
# standing_order_on_violation:  ID of the standing order to invoke.
invariants:
  - id: threshold_exceeded
    description: "The primary metric has exceeded the acceptable operating range."
    severity: warning
    check: "score > 0.9"
    standing_order_on_violation: request_more_detail

  - id: response_delayed
    description: "Entity has not responded within the expected time window."
    severity: warning
    check: "response_latency_sec > 30"
    standing_order_on_violation: request_more_detail

  - id: safety_violation
    description: "Content safety flags detected — immediate escalation required."
    severity: critical
    check: "safety_flags != []"
    standing_order_on_violation: escalate_to_authority

# ── Standing Orders ──────────────────────────────────────────────────
# Bounded automated responses the orchestrator may take.
# Each order has a max_attempts cap — when exhausted, escalation fires.
standing_orders:
  - id: request_more_detail
    action: request_more_detail
    trigger_condition: "threshold_exceeded or response_delayed"
    max_attempts: 2
    escalation_on_exhaust: false
    description: "Ask the entity to provide more detail or clarify their input."

  - id: escalate_to_authority
    action: escalate
    trigger_condition: "safety_violation"
    max_attempts: 1
    escalation_on_exhaust: true
    description: "Immediately escalate to the Domain Authority."

# ── Escalation Triggers ─────────────────────────────────────────────
# Conditions that cause the system to hand off to a human authority.
escalation_triggers:
  - id: standing_order_exhausted
    condition: "A standing order reached max_attempts without resolution."
    target_role: domain_authority
    sla_minutes: 30

  - id: critical_safety_event
    condition: "A critical invariant fired (safety_violation)."
    target_role: domain_authority
    sla_minutes: 5

# ── Artifacts ────────────────────────────────────────────────────────
# Achievements / milestones entities can earn.  Can be empty.
# TODO: Define domain-specific artifacts, or leave empty.
artifacts: []
