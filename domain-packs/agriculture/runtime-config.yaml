runtime:
  global_system_prompt_path: specs/global-system-prompt-v1.md
  domain_system_prompt_path: domain-packs/agriculture/prompts/domain-system-override.md
  evidence_extraction_prompt_path: domain-packs/agriculture/prompts/evidence-extraction.md

  domain_physics_path: domain-packs/agriculture/operations-level-1/domain-physics.json
  subject_profile_path: domain-packs/agriculture/operations-level-1/example-subject.yaml

  default_task_spec:
    task_id: operations-signal-001
    nominal_difficulty: 0.4
    skills_required:
      - monitor_signal
      - report_variance

  domain_step_params:
    window_turns: 5
    drift_threshold: 0.4

  evidence_defaults:
    within_tolerance: true
    response_latency_sec: 10.0
    off_task_ratio: 0.0
    step_count: 0

  deterministic_templates:
    task_presentation: "Proceed with {task_id}. Report current operating signal and any drift notes."
    more_steps_request: "Provide additional operational detail for {task_id} so we can verify tolerance."
    default: "Continue with {task_id} and share the next operational update."

adapters:
  state_builder:
    module_path: domain-packs/agriculture/reference-implementations/runtime-adapters.py
    callable: build_initial_learning_state
  domain_step:
    module_path: domain-packs/agriculture/reference-implementations/runtime-adapters.py
    callable: domain_step
  evidence_extractor:
    module_path: domain-packs/agriculture/reference-implementations/runtime-adapters.py
    callable: extract_evidence
