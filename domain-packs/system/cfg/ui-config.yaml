# ── System Domain — UI Configuration ──────────────────────────────────
# Extracted from runtime-config.yaml.  The runtime loader auto-discovers
# this file (same directory, conventional name) and merges its keys into
# the runtime config.  Inline definitions in runtime-config.yaml take
# precedence if both files define the same top-level key.
#
# version: 1.0.0
# last_updated: 2026-04-19

ui_manifest:
  title: "Project Lumina"
  subtitle: "System — Infrastructure Interface"
  domain_label: "System"
  panels:
    - id: pack_integrity
      label: "Pack Integrity"
      endpoint: "/api/dashboard/system/pack-integrity"
      roles: [root, auditor]
      type: table
    - id: log_health
      label: "Log Health"
      endpoint: "/api/dashboard/system/log-health"
      roles: [root, auditor, it_support]
      type: metric
    - id: runtime_status
      label: "Runtime Status"
      endpoint: "/api/dashboard/system/runtime-status"
      roles: [root, it_support]
      type: metric

  system_role_to_domain_role:
    root: system_admin
    it_support: system_operator

  role_layouts:
    system_admin:
      inherits: system_operator
      sidebar_panels:
        - id: system_log
          label: "System Log"
          component: SystemLogPanel
        - id: pack_integrity
          label: "Pack Integrity"
          component: DataPanel
          endpoint: "/api/dashboard/system/pack-integrity"
      capabilities:
        - full_system_access
        - view_all_logs
    system_operator:
      sidebar_panels:
        - id: runtime_status
          label: "Runtime Status"
          component: DataPanel
          endpoint: "/api/dashboard/system/runtime-status"
        - id: log_health
          label: "Log Health"
          component: DataPanel
          endpoint: "/api/dashboard/system/log-health"
      capabilities:
        - view_runtime_status
        - view_log_health

# ── UI Plugin ─────────────────────────────────────────────
ui:
  plugin_bundle: domain-packs/system/web/dist/plugin.js
  dashboard_tabs:
    - id: escalations
      label: Escalations
      roles: [root, domain_authority, it_support, qa, auditor]
    - id: commands
      label: Commands
      roles: [root, domain_authority, it_support]
    - id: ingestions
      label: Ingestions
      roles: [root, domain_authority]
    - id: logs
      label: System Log
      roles: [root, domain_authority, qa, auditor]
    - id: daemon
      label: Daemon
      roles: [root, auditor]
    - id: daemon-monitor
      label: Monitor
      roles: [root, it_support, auditor]
