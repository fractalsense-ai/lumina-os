# ─────────────────────────────────────────────────────────────
# Admin Operations Schema — Education Domain
# ─────────────────────────────────────────────────────────────
#
# Education-specific subset of admin operations with descriptions
# tailored for school/university contexts.  Referenced by the SLM
# command translator when operating in the education domain.
#
# Inherits execution semantics (RBAC gates, HITL staging, etc.)
# from the system-level admin pipeline.  This file customises only
# the *description* field so the SLM can produce higher-quality
# intent matching for education-specific natural language.
#
# See: docs/7-concepts/command-execution-pipeline.md
# See: docs/7-concepts/domain-adapter-pattern.md
# See: docs/7-concepts/nlp-semantic-router.md
# ─────────────────────────────────────────────────────────────

# version: 1.0.0
# last_updated: 2026-04-05
operations:

  # ── Read-only / informational (HITL-exempt) ──────────────
  - name: list_commands
    description: "List available admin commands for the education domain. Shows which commands are immediate vs staged."
    params:
      include_details: "boolean — true (default) for full details, false for names only"

  - name: list_users
    description: "List students, teachers, and staff in the education domain. Domain authorities see only users within their governed modules. Supports filtering by module or domain role."
    params:
      role: "string — filter by system role (optional)"
      domain_id: "string — filter to users in a specific domain (defaults to 'education')"
      module_id: "string — filter to users in a specific education module (optional)"
      domain_role: "string — filter to users with a specific domain role, e.g. 'student', 'teacher' (optional)"

  - name: list_modules
    description: "List education modules (e.g. algebra-level-1, pre-algebra, general-education)."
    params:
      domain_id: "string — defaults to 'education' when omitted"

  - name: list_escalations
    description: "List open escalation events for education modules (e.g. unresolved student incidents, assignment disputes)."
    params:
      domain_id: "string — defaults to 'education' when omitted"
      status: "string — filter by status (optional, default: open)"

  - name: module_status
    description: "Show the current status of an education module (e.g. algebra-level-1 active learner count, physics hash)."
    params:
      module_id: "string — education module identifier"
      domain_id: "string — defaults to 'education' when omitted"

  - name: get_domain_physics
    description: "Retrieve the current domain physics configuration for an education module. Inspect invariants, standing orders, and escalation triggers."
    params:
      domain_id: "string — defaults to 'education'"
      module_id: "string — specific education module (optional, returns default module if omitted)"

  - name: list_domain_rbac_roles
    description: "List education-specific roles (student, teacher, teaching_assistant, guardian, domain_authority) defined in domain physics."
    params:
      domain_id: "string — defaults to 'education'"

  - name: get_domain_module_manifest
    description: "Retrieve the education domain's full module manifest including module IDs, labels, and versions."
    params:
      domain_id: "string — defaults to 'education'"

  - name: explain_reasoning
    description: "Explain why the system made a specific decision — e.g. why a student was escalated or why a score threshold triggered."
    params:
      event_id: "string — System Log record ID or escalation ID to explain"

  - name: view_my_profile
    description: "Show the calling user's own profile summary — display name, preferences, interests, and assigned modules. Sensitive fields (mastery scores, internal IDs) are redacted. Available to all roles."
    params:
      domain_id: "string — defaults to 'education'"

  # ── User management (DA-scoped) ─────────────────────────
  - name: invite_user
    description: "Invite a new student, teacher, or teaching assistant to the education domain. Domain authorities may invite users with 'user' or 'guest' role within their governed modules."
    params:
      username: "string — the new user's display name"
      role: "string — system role: user or guest (for domain authorities)"
      intended_domain_role: "string — education role such as student, teacher, teaching_assistant, guardian (advisory, preserved for domain-role assignment)"
      domain_id: "string — defaults to 'education'"
      email: "string — email address (optional)"

  - name: assign_domain_role
    description: "Assign an education role (student, teacher, teaching_assistant, guardian) to a user for a specific module."
    params:
      user_id: "string — target user identifier"
      module_id: "string — education module identifier (e.g. education/algebra-level-1)"
      domain_role: "string — education role to assign"

  - name: revoke_domain_role
    description: "Remove a user's education role from a module (e.g. un-enrol a student from algebra-level-1)."
    params:
      user_id: "string — target user identifier"
      module_id: "string — education module identifier to revoke access for"

  - name: assign_student
    description: "Assign a student to a teacher's roster. Teachers can assign students to themselves; domain authorities can assign to any teacher. Sets the student's escalation route so incidents are directed to the assigned teacher."
    params:
      student_id: "string — the student's user ID"
      teacher_id: "string — the teacher's user ID (optional, defaults to the caller when a teacher invokes this)"

  - name: remove_student
    description: "Remove a student from a teacher's roster. Teachers can remove students from themselves only; domain authorities can remove from any teacher. Clears the student's escalation route for that teacher."
    params:
      student_id: "string — the student's user ID"
      teacher_id: "string — the teacher's user ID (optional, defaults to the caller when a teacher invokes this)"

  - name: assign_module
    description: "Assign a curriculum module to a user (e.g. enrol a student in algebra-level-1). Domain authorities and teachers with the assign_modules_to_students capability can assign modules directly."
    params:
      user_id: "string — target user identifier"
      module_id: "string — education module identifier (e.g. domain/edu/algebra-level-1/v1)"

  - name: assign_modules
    description: "Assign one or more curriculum modules to a student or to an entire classroom. Accepts comma-separated short names (e.g. 'pre-algebra,algebra-intro'). Use target 'classroom' to assign to all students on your roster."
    params:
      module_ids: "string — comma-separated module short names or full ids (e.g. 'pre-algebra,algebra-intro')"
      target: "string — student user-id/username, or 'classroom' to assign to all rostered students"

  - name: remove_module
    description: "Remove a curriculum module from a user's access list. Domain authorities and teachers with the assign_modules_to_students capability can remove modules directly."
    params:
      user_id: "string — target user identifier"
      module_id: "string — education module identifier to remove"

  - name: request_module_assignment
    description: "Request enrolment in an education module. Creates a HITL escalation for the module's teacher or domain authority to approve."
    params:
      domain_id: "string — defaults to 'education'"
      module_id: "string — module to request enrolment in"
      reason: "string — brief reason for the enrolment request (optional)"

  - name: request_teacher_assignment
    description: "Join a teacher's classroom (student self-assignment / roll call). The student appears on the teacher's roster immediately. Only usable by students — student_id is always the caller."
    params:
      teacher_id: "string — the teacher's user ID or display name"

  - name: request_ta_assignment
    description: "Assign yourself as a teaching assistant to a supervising teacher. Copies the teacher's current student roster to your TA profile. Only usable by teaching assistants."
    params:
      teacher_id: "string — the supervising teacher's user ID or display name"

  - name: switch_active_module
    description: "Switch your active education module. Only switches between modules you are already enrolled in — does not create new enrolments. Available to all roles."
    params:
      module_id: "string — the module to switch to (must be in your existing modules)"

  - name: update_user_preferences
    description: "Update a user's preferences. Self-service for any user; elevated system roles can update on behalf. Adds an audit note when updating another user."
    params:
      target_user_id: "string — target user's ID (defaults to caller)"
      updates: "object — key/value pairs to merge into preferences"
      note: "string — reason for the change (appended to supervisor_notes)"

  # ── Escalation / governance ──────────────────────────────
  - name: resolve_escalation
    description: "Approve, reject, or defer an education escalation (e.g. academic integrity incident, grade dispute)."
    params:
      escalation_id: "string"
      resolution: "string — one of: approved, rejected, deferred"
      rationale: "string — reason for resolution"

  # ── Physics management ───────────────────────────────────
  - name: update_domain_physics
    description: "Update fields in an education module's physics configuration (e.g. adjust score thresholds, modify standing orders)."
    params:
      domain_id: "string — defaults to 'education'"
      updates: "object — key/value pairs to merge into domain physics"

  - name: commit_domain_physics
    description: "Commit the current education domain physics hash to the System Logs after staged changes are approved."
    params:
      domain_id: "string — defaults to 'education'"

  # ── Content ingestion ────────────────────────────────────
  - name: ingest_document
    description: "Upload and ingest educational material (lesson plans, worksheets, assessments) into an education module."
    params:
      domain_id: "string — defaults to 'education'"
      module_id: "string — target education module (optional)"
      filename: "string — name of the file to ingest"

  - name: list_ingestions
    description: "List pending content ingestion drafts for education modules."
    params:
      domain_id: "string — defaults to 'education'"
      status: "string — filter by status (optional)"

  - name: review_ingestion
    description: "Show SLM-generated interpretations for an ingested educational document."
    params:
      ingestion_id: "string — ingestion document ID"

  - name: approve_interpretation
    description: "Approve a specific interpretation of ingested educational content."
    params:
      ingestion_id: "string — ingestion document ID"
      interpretation_label: "string — one of: strict, loose, hierarchical, default, or an interpretation ID"

  - name: reject_ingestion
    description: "Reject an educational content ingestion with a reason."
    params:
      ingestion_id: "string — ingestion document ID"
      reason: "string — reason for rejection"
