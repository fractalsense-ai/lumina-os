# version: 1.0.0
# last_updated: 2026-04-04
runtime:
  global_system_prompt_path: docs/5-standards/global-system-prompt.md
  domain_system_prompt_path: domain-packs/education/prompts/domain-persona-v1.md
  turn_interpretation_prompt_path: domain-packs/education/domain-lib/reference/turn-interpretation-spec-v1.md

  domain_physics_path: domain-packs/education/modules/general-education/domain-physics.json
  domain_level_physics_path: domain-packs/education/domain-physics.json
  subject_profile_path: domain-packs/education/profiles/student.yaml

  # ── Hierarchical profile templates (Base → Domain → Role) ──
  base_profile_path: domain-packs/system/cfg/base-entity-profile.yaml
  domain_profile_extension_path: domain-packs/education/cfg/domain-profile-extension.yaml
  profile_templates:
    default: domain-packs/education/profiles/student.yaml
    domain_authority: domain-packs/education/profiles/domain_authority.yaml
    teacher: domain-packs/education/profiles/teacher.yaml
    teaching_assistant: domain-packs/education/profiles/teaching_assistant.yaml
    student: domain-packs/education/profiles/student.yaml
    parent: domain-packs/education/profiles/parent.yaml

  # Module routing: maps a student profile's domain_id to the correct domain-physics file.
  # The static domain_physics_path above is the default fallback for sessions without a domain_id.
  module_map:
    domain/edu/general-education/v1:
      domain_physics_path: domain-packs/education/modules/general-education/domain-physics.json
      domain_system_prompt_path: domain-packs/education/prompts/student-commons-persona-v1.md
      turn_interpretation_prompt_path: domain-packs/education/domain-lib/reference/freeform-turn-interpretation-spec-v1.md
      turn_input_defaults:
        intent_type: "journaling"
        off_task_ratio: 0.0
        frustration_marker_count: 0
        correctness: "n/a"
        response_latency_sec: 5.0
        problem_solved: false
      adapters:
        state_builder:
          module_path: domain-packs/education/controllers/freeform_adapters.py
          callable: freeform_build_initial_state
        domain_step:
          module_path: domain-packs/education/controllers/freeform_adapters.py
          callable: freeform_domain_step
        turn_interpreter:
          module_path: domain-packs/education/controllers/freeform_adapters.py
          callable: freeform_interpret_turn_input
      ui_overrides:
        subtitle: "Student Commons"
    domain/edu/pre-algebra/v1:
      domain_physics_path: domain-packs/education/modules/pre-algebra/domain-physics.json
      ui_overrides:
        subtitle: "Pre-Algebra"
    domain/edu/algebra-intro/v1:
      domain_physics_path: domain-packs/education/modules/algebra-intro/domain-physics.json
      ui_overrides:
        subtitle: "Algebra — Introduction"
    domain/edu/algebra-1/v1:
      domain_physics_path: domain-packs/education/modules/algebra-1/domain-physics.json
      ui_overrides:
        subtitle: "Algebra Level 1 — Foundations"
    domain/edu/algebra-level-1/v1:
      domain_physics_path: domain-packs/education/modules/algebra-level-1/domain-physics.json
      ui_overrides:
        subtitle: "Algebra Level 1 — Foundations"
    domain/edu/domain-authority/v1:
      local_only: true
      domain_physics_path: domain-packs/education/modules/domain-authority/domain-physics.json
      domain_system_prompt_path: domain-packs/education/prompts/governance-persona-v1.md
      turn_interpretation_prompt_path: domain-packs/education/prompts/governance-turn-interpretation-spec-v1.md
      ui_overrides:
        subtitle: "Domain Authority — Governance"
      adapters:
        state_builder:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: build_governance_state
        domain_step:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: governance_domain_step
        turn_interpreter:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: interpret_turn_input
        nlp_pre_interpreter:
          module_path: domain-packs/education/controllers/governance_nlp.py
          callable: governance_nlp_preprocess
      turn_input_defaults:
        query_type: general
        target_component: null
        urgency: routine
        response_latency_sec: 5.0
        off_task_ratio: 0.0
      turn_input_schema:
        query_type:
          type: enum
          values: [general, status_check, admin_command, module_management, escalation_review, physics_edit]
        target_component:
          type: string
          nullable: true
        urgency:
          type: enum
          values: [routine, elevated, critical]
    domain/edu/teacher/v1:
      local_only: true
      domain_physics_path: domain-packs/education/modules/teacher/domain-physics.json
      domain_system_prompt_path: domain-packs/education/prompts/governance-persona-v1.md
      turn_interpretation_prompt_path: domain-packs/education/prompts/governance-turn-interpretation-spec-v1.md
      ui_overrides:
        subtitle: "Teacher — Classroom Management"
      adapters:
        state_builder:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: build_governance_state
        domain_step:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: governance_domain_step
        turn_interpreter:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: interpret_turn_input
        nlp_pre_interpreter:
          module_path: domain-packs/education/controllers/governance_nlp.py
          callable: governance_nlp_preprocess
      turn_input_defaults:
        query_type: general
        target_component: null
        urgency: routine
        response_latency_sec: 5.0
        off_task_ratio: 0.0
      turn_input_schema:
        query_type:
          type: enum
          values: [general, status_check, admin_command, module_management, escalation_review, physics_edit]
        target_component:
          type: string
          nullable: true
        urgency:
          type: enum
          values: [routine, elevated, critical]
    domain/edu/teaching-assistant/v1:
      local_only: true
      domain_physics_path: domain-packs/education/modules/teaching-assistant/domain-physics.json
      domain_system_prompt_path: domain-packs/education/prompts/governance-persona-v1.md
      turn_interpretation_prompt_path: domain-packs/education/prompts/governance-turn-interpretation-spec-v1.md
      ui_overrides:
        subtitle: "Teaching Assistant"
      adapters:
        state_builder:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: build_governance_state
        domain_step:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: governance_domain_step
        turn_interpreter:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: interpret_turn_input
        nlp_pre_interpreter:
          module_path: domain-packs/education/controllers/governance_nlp.py
          callable: governance_nlp_preprocess
      turn_input_defaults:
        query_type: general
        target_component: null
        urgency: routine
        response_latency_sec: 5.0
        off_task_ratio: 0.0
      turn_input_schema:
        query_type:
          type: enum
          values: [general, status_check, admin_command, module_management, escalation_review, physics_edit]
        target_component:
          type: string
          nullable: true
        urgency:
          type: enum
          values: [routine, elevated, critical]
    domain/edu/guardian/v1:
      local_only: true
      domain_physics_path: domain-packs/education/modules/guardian/domain-physics.json
      domain_system_prompt_path: domain-packs/education/prompts/governance-persona-v1.md
      turn_interpretation_prompt_path: domain-packs/education/prompts/governance-turn-interpretation-spec-v1.md
      ui_overrides:
        subtitle: "Guardian — Student Progress"
      adapters:
        state_builder:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: build_governance_state
        domain_step:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: governance_domain_step
        turn_interpreter:
          module_path: domain-packs/education/controllers/governance_adapters.py
          callable: interpret_turn_input
        nlp_pre_interpreter:
          module_path: domain-packs/education/controllers/governance_nlp.py
          callable: governance_nlp_preprocess
      turn_input_defaults:
        query_type: general
        target_component: null
        urgency: routine
        response_latency_sec: 5.0
        off_task_ratio: 0.0
      turn_input_schema:
        query_type:
          type: enum
          values: [general, status_check, admin_command, module_management, escalation_review, physics_edit]
        target_component:
          type: string
          nullable: true
        urgency:
          type: enum
          values: [routine, elevated, critical]

  # Role-to-default-module routing: maps domain roles to their default module.
  role_to_default_module:
    domain_authority: domain/edu/domain-authority/v1
    teacher: domain/edu/teacher/v1
    teaching_assistant: domain/edu/teaching-assistant/v1
    student: domain/edu/general-education/v1
    parent: domain/edu/guardian/v1

  access_control:
    required_role: user
    allowed_roles:
      - root
      - domain_authority
      - it_support
      - qa
      - user

  additional_specs:
    - domain-packs/education/world-sim/magic-circle-consent-v1.md
    - domain-packs/education/world-sim/world-sim-spec-v1.md
    - domain-packs/education/world-sim/artifact-and-mastery-spec-v1.md
    - domain-packs/education/world-sim/mud-world-builder-spec-v1.md

  world_sim:
    enabled: true
    default_theme: general_math
    mud_world_builder:
      enabled: true
      # Templates are loaded from the file below at runtime and passed into
      # build_initial_learning_state() as the mud_world_cfg["templates"] list.
      templates_path: domain-packs/education/world-sim/mud-world-templates.yaml
    themes:
      space_exploration:
        setting_description: "You are the mission mathematician aboard the Helios research vessel. All problems are mission-critical calculations."
        artifact_framing: mission_badge
        task_framing: mission_briefing
        exit_phrase: end mission
        preference_keywords:
          - space
          - rockets
          - astronaut
          - astronauts
          - nasa
          - stars
          - science fiction
          - sci-fi
          - galaxy
          - planets
      nature_and_outdoors:
        setting_description: "You are a junior field scientist cataloguing discoveries at a nature reserve. Each problem is a measurement or calculation from your field notes."
        artifact_framing: field_record
        task_framing: field_observation
        exit_phrase: end fieldwork
        preference_keywords:
          - nature
          - animals
          - outdoors
          - wildlife
          - hiking
          - environment
          - ecology
          - plants
          - biology
      sports_and_games:
        setting_description: "You are the team strategist and statistician for your school’s sports program. Every calculation helps your team perform better."
        artifact_framing: team_achievement
        task_framing: play_call
        exit_phrase: end practice
        preference_keywords:
          - sport
          - sports
          - soccer
          - basketball
          - football
          - baseball
          - games
          - gaming
          - video games
          - esports
      general_math:
        setting_description: "You are working through a set of math challenges."
        artifact_framing: certificate
        task_framing: problem
        exit_phrase: exit session
        preference_keywords: []

  pre_turn_checks:
    -
      id: consent_boundary
      enabled: true
      description: "Require valid consent record before session proceeds; enforces Principle 8"
      on_failure: escalate

  default_task_spec:
    task_id: algebra-linear-eq-001
    nominal_difficulty: 0.45
    skills_required:
      - equivalence_preserved
      - no_illegal_operations
      - solution_verifies
      - show_work_minimum

  domain_step_params:
    min_challenge: 0.3
    max_challenge: 0.7
    drift_window_turns: 10
    minor_drift_threshold: 0.3
    major_drift_threshold: 0.5
    persistence_required: 3
    fluency_monitor:
      target_consecutive_successes: 3
      time_threshold_seconds: 120
      tier_progression:
        - tier_1
        - tier_2
        - tier_3

  turn_input_defaults:
    correctness: partial
    hint_used: false
    response_latency_sec: 10.0
    frustration_marker_count: 0
    repeated_error: false
    off_task_ratio: 0.0
    step_count: 0
    problem_solved: false

  turn_input_schema:
    correctness:
      type: enum
      values:
        - correct
        - incorrect
        - partial
      default: partial
    hint_used:
      type: bool
      default: false
    response_latency_sec:
      type: float
      minimum: 0.0
      default: 10.0
    frustration_marker_count:
      type: int
      minimum: 0
      default: 0
    repeated_error:
      type: bool
      default: false
    off_task_ratio:
      type: float
      minimum: 0.0
      maximum: 1.0
      default: 0.0
    step_count:
      type: int
      minimum: 0
      default: 0
    equivalence_preserved:
      type: bool
    substitution_check:
      type: bool
      default: false
    method_recognized:
      type: bool
      default: false
    illegal_operations:
      type: list
      default: []
    problem_solved:
      type: bool
      default: false

  action_prompt_type_map:
    request_more_steps: more_steps_request
    request_verification_retry: verification_request
    request_method_justification: method_justification_request
    trigger_targeted_hint: hint
    inject_domain_rule: inject_domain_rule
    advance_tier: task_presentation
    definition_lookup: definition_lookup
    task_complete: task_complete
    # Governance role action mappings
    governance_command: governance_command
    governance_status: governance_status
    governance_progress: governance_progress
    governance_management: governance_management
    governance_escalation: governance_escalation
    governance_general: governance_general

  deterministic_templates:
    hint: "Let's take one small step on {task_id}. Show the next equivalence-preserving move."
    more_steps_request: "Please show your work step-by-step for {task_id} and keep each operation balanced."
    scaffold: "Let's break {task_id} into smaller steps and do one move at a time."
    zpd_scaffold: "Let's simplify this and do one clear step for {task_id}."
    pause_or_break: "Let's pause briefly. When ready, we will continue with one smaller step."
    definition_lookup: "{term}: {definition} Example: {example_in_context}"
    zpd_intervene_or_escalate: "Let's pause and reset. We can continue with a smaller step once you're ready."
    task_complete: "Correct! Now solve: {task_id}. Show each step."
    default: "Continue with {task_id}. Share your next step and we will verify it together."
    # Governance role templates
    governance_command: "Processing your administrative request."
    governance_status: "Here is the current status for your domain."
    governance_progress: "Here is the progress overview for your domain."
    governance_management: "Processing your module management request."
    governance_escalation: "Here are the current escalations requiring attention."
    governance_general: "How can I assist you with domain governance today?"

  deterministic_templates_mud:
    hint: "{guide_npc}: A {obstacle_theme} blocks the path in {zone}, {protagonist}. Take one small step on {task_id} to continue."
    scaffold: "{guide_npc}: Let us break this {obstacle_theme} into smaller pieces, {protagonist}. One move at a time in {zone}."
    zpd_scaffold: "{guide_npc}: This {obstacle_theme} is tricky, {protagonist}. Let us simplify and do one clear step for {task_id}."
    task_complete: "{guide_npc}: Well done, {protagonist}! The {obstacle_theme} in {zone} is defeated. Now face the next challenge: {task_id}."
    task_presentation: "{guide_npc}: Welcome to {zone}, {protagonist}. A new {obstacle_theme} stands between you and the {macguffin}. Solve {task_id} to proceed."
    default: "{guide_npc}: The {obstacle_theme} awaits in {zone}, {protagonist}. Continue with {task_id} to reach the {macguffin}."

  tool_call_policies:
    request_verification_retry:
      -
        tool_id: substitution_checker
        payload:
          left_value: "{turn_data.left_value}"
          right_value: "{turn_data.right_value}"
    tool_request:
      -
        tool_id: calculator
        payload:
          expression: "{turn_data.tool_expression}"

ui_manifest:
  title: "Project Lumina"
  subtitle: "Education"
  domain_label: "Education"
  consent_heading: "Project Lumina"
  consent_text: "I am not grading you for a report card. I do not keep transcripts of what you say. If we get stuck, we ask for human help."
  consent_button_label: "I Agree to the Magic Circle"
  placeholder_text: "Type your steps here..."
  theme:
    primary: "oklch(0.45 0.08 220)"
    accent: "oklch(0.72 0.12 60)"
    background: "oklch(0.96 0.01 80)"
  panels:
    - id: zpd_distribution
      label: "ZPD Distribution"
      endpoint: "/api/dashboard/education/zpd-distribution"
      roles: [root, domain_authority, qa]
      type: chart
    - id: step_completion
      label: "Step Completion"
      endpoint: "/api/dashboard/education/step-completion"
      roles: [root, domain_authority]
      type: metric
    - id: vocabulary_growth
      label: "Vocabulary Growth"
      endpoint: "/api/dashboard/education/vocabulary-growth"
      roles: [root, domain_authority, teacher]
      type: chart

  # ── Role-based UI layouts ──────────────────────────────────
  # Each role gets a layout definition that controls which sidebar panels
  # and capabilities are available. `inherits` flattens the parent chain
  # so domain_authority sees everything teacher sees, plus its own panels.
  role_layouts:
    domain_authority:
      inherits: teacher
      sidebar_panels:
        - id: domain_overview
          label: "Domain Overview"
          component: DataPanel
          data_source: domain_overview
        - id: staff_directory
          label: "Staff Directory"
          component: DataPanel
          data_source: staff_directory
        - id: user_directory
          label: "User Directory"
          component: DataPanel
          data_source: user_directory
        - id: module_directory
          label: "Module Management"
          component: DataPanel
          data_source: module_directory
        - id: escalation_queue
          label: "Escalation Queue"
          component: EscalationQueue
        - id: system_log
          label: "System Log"
          component: SystemLogPanel
      capabilities:
        - assign_modules
        - manage_teachers
        - view_all_progress
        - resolve_escalations
        - test_as_role
    teacher:
      inherits: student
      sidebar_panels:
        - id: managed_users
          label: "My Classroom"
          component: DataPanel
          data_source: managed_users
          source_path: educator_state.assigned_students
        - id: managed_user_progress
          label: "Student Progress"
          component: DataPanel
          data_source: managed_user_progress
          source_path: educator_state.assigned_students
        - id: escalation_queue
          label: "Escalations"
          component: EscalationQueue
        - id: governed_modules
          label: "Module Assignments"
          component: DataPanel
          data_source: governed_modules
      capabilities:
        - assign_modules_to_students
        - view_student_progress
        - resolve_escalations
    teaching_assistant:
      inherits: student
      sidebar_panels:
        - id: managed_users
          label: "Assigned Students"
          component: DataPanel
          data_source: managed_users
          source_path: assistant_state.assigned_students
        - id: request_queue
          label: "Hint Queue"
          component: DataPanel
          data_source: empty_queue
      capabilities:
        - view_student_progress
        - issue_hints
    student:
      sidebar_panels:
        - id: self_profile
          label: "My Profile"
          component: DataPanel
          data_source: self_profile
        - id: self_modules
          label: "My Modules"
          component: DataPanel
          data_source: self_modules
        - id: self_preferences
          label: "Preferences"
          component: DataPanel
          data_source: self_preferences
      capabilities:
        - view_my_profile
        - view_available_modules
        - update_my_preferences
    parent:
      sidebar_panels:
        - id: managed_user_progress
          label: "My Child's Progress"
          component: DataPanel
          data_source: managed_user_progress
          source_path: guardian_state.assigned_children
        - id: notification_settings
          label: "Notification Settings"
          component: DataPanel
          data_source: notification_settings
          source_path: guardian_state.notification_preferences
      capabilities:
        - view_child_progress
        - manage_notifications

# ── Domain Operation Handlers ─────────────────────────────────────────
# Operations registered here are dispatched by the admin command pipeline
# before the system elif chain.  Each entry maps an operation name to a
# handler callable, plus HITL and min-role metadata.
# See docs/7-concepts/command-execution-pipeline.md
operation_handlers:
  request_module_assignment:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: false
    min_role: user
  assign_student:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  remove_student:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  request_teacher_assignment:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  request_ta_assignment:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  assign_module:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  remove_module:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  switch_active_module:
    module_path: domain-packs/education/controllers/education_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user

adapters:
  state_builder:
    module_path: domain-packs/education/controllers/learning_adapters.py
    callable: build_initial_learning_state
  domain_step:
    module_path: domain-packs/education/controllers/learning_adapters.py
    callable: domain_step
  turn_interpreter:
    module_path: domain-packs/education/controllers/learning_adapters.py
    callable: interpret_turn_input
  nlp_pre_interpreter:
    module_path: domain-packs/education/controllers/nlp_pre_interpreter.py
    callable: nlp_preprocess
  post_turn_processor:
    module_path: domain-packs/education/controllers/education_post_turn.py
    callable: education_post_turn
  post_turn_timer:
    module_path: domain-packs/education/controllers/education_post_turn.py
    callable: education_reset_timer
  profile_serializer:
    module_path: domain-packs/education/controllers/education_profile_serializer.py
    callable: education_serialize_profile
  turn_0_presenter:
    module_path: domain-packs/education/controllers/education_turn0.py
    callable: education_turn0_check
  escalation_context:
    module_path: domain-packs/education/controllers/education_escalation_context.py
    callable: education_escalation_context
  slm_normalizer:
    module_path: domain-packs/education/controllers/slm_normalizer.py
    callable: normalize_slm_command
  tools:
    calculator:
      module_path: domain-packs/education/controllers/tool_adapters.py
      callable: calculator_tool
    substitution_checker:
      module_path: domain-packs/education/controllers/tool_adapters.py
      callable: substitution_checker_tool
    algebra_parser:
      module_path: domain-packs/education/controllers/algebra_tools.py
      callable: algebra_parser_tool
    generate_problem:
      module_path: domain-packs/education/controllers/problem_generator.py
      callable: generate_problem
    extract_physics_patch:
      module_path: domain-packs/education/controllers/governance_adapters.py
      callable: extract_physics_patch
    detect_novel_synthesis:
      module_path: domain-packs/education/controllers/governance_adapters.py
      callable: detect_novel_synthesis
  api_routes:
    post_vocabulary_metric:
      path: /api/user/{user_id}/vocabulary-metric
      method: POST
      module_path: domain-packs/education/controllers/api_handlers.py
      callable: post_vocabulary_metric
      roles: []
      request_body:
