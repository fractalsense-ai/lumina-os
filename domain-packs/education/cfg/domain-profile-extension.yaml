# Education Domain Profile Extension
# ============================================================
# Layer 2 of the hierarchical profile system (Base → Domain → Role).
# Fields shared by ALL roles in the education domain (teacher, TA,
# student, parent).  Merged on top of the base entity profile.
# ============================================================

# version: 1.1.0
# last_updated: 2026-04-05
consent:
  magic_circle_accepted: false
  consent_timestamp_utc: null
  consent_version: null
  guardian_consent: null

session_history:
  total_sessions: 0
  last_session_utc: null
  total_turns: 0

# ── Teacher-editable notes (append-only, timestamped) ───────
teacher_notes: []

# ── Guardian associations (populated by assign_guardian op) ──
# assigned_guardians: list of guardian user IDs linked to a student
assigned_guardians: []

# ── Guardian state (populated on guardian profiles) ──────────
# guardian_state.assigned_children: list of student IDs the guardian oversees
guardian_state:
  assigned_children: []
