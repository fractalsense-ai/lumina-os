# domain-registry.yaml — Multi-domain registry for Project Lumina
#
# Maps each domain_id to its runtime-config.yaml path.
# Set LUMINA_DOMAIN_REGISTRY_PATH to this file to enable multi-domain routing.
# When a domain registry is active, requests specify domain_id to select a domain.
#
# See: standards/domain-registry-schema-v1.json

default_domain: education

domains:
  education:
    runtime_config_path: domain-packs/education/cfg/runtime-config.yaml
    label: Education — Algebra Level 1
    description: K-12 algebra tutoring domain with scaffolded problem solving.
    keywords:
      - algebra
      - equation
      - math
      - solve
      - variable
      - tutoring

  agriculture:
    runtime_config_path: domain-packs/agriculture/cfg/runtime-config.yaml
    label: Agriculture — Operations Level 1
    description: Agricultural operations monitoring and variance reporting.
    keywords:
      - crop
      - yield
      - soil
      - harvest
      - irrigation
      - agriculture
