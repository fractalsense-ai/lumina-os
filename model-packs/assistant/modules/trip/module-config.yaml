# version: 0.1.0
# last_updated: 2026-04-23
#
# Module: trip (Trip planning — multi-turn itinerary assembly)

domain_physics_path: model-packs/assistant/modules/trip/domain-physics.json
turn_interpretation_prompt_path: model-packs/assistant/domain-lib/reference/trip-task-spec-v1.md

turn_input_schema:
  trip_destination:
    type: string
    nullable: true
    default: null
  trip_origin_airport:
    type: string
    nullable: true
    default: null
  trip_date_start:
    type: string
    nullable: true
    default: null
  trip_date_end:
    type: string
    nullable: true
    default: null
  trip_activity_preferences:
    type: string
    nullable: true
    default: null
  trip_budget_usd:
    type: int
    nullable: true
    default: null
  trip_accommodation_style:
    type: string
    nullable: true
    default: null
  trip_party_size:
    type: int
    minimum: 1
    default: 1

initial_module_state:
  turn_count: 0
  trip_destination: null
  trip_origin_airport: null
  trip_date_start: null
  trip_date_end: null
  trip_activity_preferences: null
  trip_budget_usd: null
  trip_accommodation_style: null
  trip_party_size: 1
  hard_fields_complete: false
  trip_missing_hard: []
  trip_missing_soft: []

default_task_spec:
  task_id: trip-task-001
  nominal_difficulty: 0.5

turn_input_defaults:
  intent_type: trip
  task_status: open
  tool_call_requested: true
  trip_destination: null
  trip_origin_airport: null
  trip_date_start: null
  trip_date_end: null
  trip_activity_preferences: null
  trip_budget_usd: null
  trip_accommodation_style: null
  trip_party_size: 1
  off_task_ratio: 0.0
  response_latency_sec: 5.0
  satisfaction_signal: unknown

ui_overrides:
  subtitle: "Trip Planning"
