# version: 0.1.0
# last_updated: 2026-04-20
#
# Module: planning (Task planning — extended multi-turn)

domain_physics_path: model-packs/assistant/modules/planning/domain-physics.json
turn_interpretation_prompt_path: model-packs/assistant/domain-lib/reference/planning-task-spec-v1.md

turn_input_schema:
  goal:
    type: string
    nullable: true
    default: null
  constraints:
    type: array
    default: []
  horizon_days:
    type: int
    minimum: 1
    default: 3

initial_module_state:
  turn_count: 0
  plans_created: 0
  active_plan_id: null
  constraints_gathered: false

default_task_spec:
  task_id: planning-task-001
  nominal_difficulty: 0.4

turn_input_defaults:
  intent_type: planning
  task_status: open
  tool_call_requested: true
  goal: null
  constraints: []
  horizon_days: 3
  off_task_ratio: 0.0
  response_latency_sec: 5.0
  satisfaction_signal: unknown

ui_overrides:
  subtitle: "Planning"
