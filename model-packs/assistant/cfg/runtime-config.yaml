# ─── Assistant Domain — Runtime Configuration ────────────────────────
# Core configuration for the general-purpose assistant domain pack.
# Intent-based per-turn module routing — no assignment-based routing.
#
# version: 1.0.0
# last_updated: 2026-04-20
# ──────────────────────────────────────────────────────────────────────

runtime:
  # ── Required prompt paths ─────────────────────────────────────────
  global_system_prompt_path: docs/5-standards/global-system-prompt.md
  domain_system_prompt_path: model-packs/assistant/prompts/domain-persona-v1.md
  turn_interpretation_prompt_path: model-packs/assistant/domain-lib/reference/turn-interpretation-spec-v1.md
  multi_task_interpretation_prompt_path: model-packs/assistant/domain-lib/reference/multi-task-turn-interpreter-spec-v1.md
  # ── Required data paths ───────────────────────────────────────────
  domain_physics_path: model-packs/assistant/modules/conversation/domain-physics.json
  subject_profile_path: model-packs/assistant/profiles/entity.yaml

  # ── Hierarchical profile templates (Base → Domain → Role) ────────
  base_profile_path: model-packs/system/cfg/base-entity-profile.yaml
  domain_profile_extension_path: model-packs/assistant/cfg/domain-profile-extension.yaml

  profile_templates:
    default: model-packs/assistant/profiles/entity.yaml

  # ── SLM weight overrides ──────────────────────────────────────────
  slm_weight_overrides:
    turn_interpretation: low

  # ── Module Map ────────────────────────────────────────────────────
  module_map:
    domain/asst/conversation/v1:
      module_path: model-packs/assistant/modules/conversation
    domain/asst/weather/v1:
      module_path: model-packs/assistant/modules/weather
    domain/asst/calendar/v1:
      module_path: model-packs/assistant/modules/calendar
    domain/asst/search/v1:
      module_path: model-packs/assistant/modules/search
    domain/asst/creative-writing/v1:
      module_path: model-packs/assistant/modules/creative-writing
    domain/asst/planning/v1:
      module_path: model-packs/assistant/modules/planning
    domain/asst/trip/v1:
      module_path: model-packs/assistant/modules/trip
    domain/asst/domain-authority/v1:
      module_path: model-packs/assistant/modules/domain-authority
    domain/asst/persona-craft/v1:
      module_path: model-packs/assistant/modules/persona-craft

  # ── Role-based default modules ────────────────────────────────────
  role_to_default_module:
    user: domain/asst/conversation/v1
    domain_authority: domain/asst/domain-authority/v1

  # ── Domain Roles ─────────────────────────────────────────────
  domain_roles:
    domain_authority: { tier: admin, label: "Assistant Domain Authority" }
    user:             { tier: user,  label: "User" }

  # ── Access Control ────────────────────────────────────────
  access_control:
    required_role: user
    min_tier: user

  # ── Turn Input Schema ─────────────────────────────────────────────
  turn_input_schema:
    intent_type:
      type: enum
      values:
        - general
        - weather
        - calendar
        - search
        - creative
        - planning
        - trip
        - governance
        - persona
      default: general
      description: "Classified intent of the user's turn."
    task_status:
      type: enum
      values:
        - open
        - completed
        - abandoned
        - deferred
        - n/a
      default: "n/a"
      description: "Task lifecycle status after this turn."
    tool_call_requested:
      type: bool
      default: false
      description: "Whether the turn requires a tool call to fulfill."
    off_task_ratio:
      type: float
      minimum: 0.0
      maximum: 1.0
      default: 0.0
      description: "Fraction of message content that is off-topic."
    response_latency_sec:
      type: float
      minimum: 0.0
      default: 5.0
      description: "Seconds between prompt display and entity response."
    satisfaction_signal:
      type: enum
      values:
        - positive
        - neutral
        - negative
        - unknown
      default: unknown
      description: "Detected user satisfaction signal."
    # ── Intent-specific fields (null when not applicable) ────────
    location:
      type: string
      nullable: true
      default: null
      description: "Location extracted for weather intent."
    forecast_days:
      type: int
      nullable: true
      default: null
      minimum: 1
      maximum: 7
      description: "Forecast days for weather intent (1-7)."
    query:
      type: string
      nullable: true
      default: null
      description: "Search query derived from user message."
    max_results:
      type: int
      nullable: true
      default: null
      minimum: 1
      maximum: 10
      description: "Max search results (1-10)."
    date_start:
      type: string
      nullable: true
      default: null
      description: "ISO 8601 date start for calendar intent."
    date_end:
      type: string
      nullable: true
      default: null
      description: "ISO 8601 date end for calendar intent."
    goal:
      type: string
      nullable: true
      default: null
      description: "Concise goal statement for planning intent."
    constraints:
      type: string
      nullable: true
      default: null
      description: "Planning constraints or requirements."
    horizon_days:
      type: int
      nullable: true
      default: null
      minimum: 1
      description: "Planning horizon in days."
    # ── Trip planning fields ────────────────────────────────────────
    trip_destination:
      type: string
      nullable: true
      default: null
      description: "Primary travel destination (city / region / country)."
    trip_origin_airport:
      type: string
      nullable: true
      default: null
      description: "Departure airport IATA code or 'City, ST' string."
    trip_date_start:
      type: string
      nullable: true
      default: null
      description: "ISO 8601 outbound travel date."
    trip_date_end:
      type: string
      nullable: true
      default: null
      description: "ISO 8601 return travel date."
    trip_activity_preferences:
      type: string
      nullable: true
      default: null
      description: "Comma-separated activity preferences (soft invariant)."
    trip_budget_usd:
      type: int
      nullable: true
      default: null
      minimum: 0
      description: "Approximate total trip budget in USD (soft invariant)."
    trip_accommodation_style:
      type: string
      nullable: true
      default: null
      description: "Preferred lodging type: hotel|hostel|airbnb|resort|flexible (soft invariant)."
    trip_party_size:
      type: int
      nullable: true
      default: null
      minimum: 1
      description: "Number of travelers."

  # ── Action → Prompt Type Map ──────────────────────────────────────
  action_prompt_type_map:
    idle_prompt_offer: idle_prompt
    confirm_before_write: confirmation_request
    cite_sources: citation_response
    gather_constraints_first: constraint_gathering
    respect_creative_intent: creative_response
    gather_trip_hard_invariants: trip_hard_constraint_gathering
    gather_trip_soft_details: trip_soft_constraint_gathering
    trip_plan_create: trip_planning

  # ── Deterministic Templates ───────────────────────────────────────
  deterministic_templates:
    task_presentation: "How can I help you with {task_id}?"
    idle_prompt: "Is there anything else I can help you with?"
    confirmation_request: "Just to confirm — would you like me to proceed with {task_id}?"
    citation_response: "Here's what I found. Sources are cited below."
    constraint_gathering: "Before I start on {task_id}, let me gather some details."
    creative_response: "Here's what I came up with. Let me know if you'd like changes."
    escalate: "I'm connecting you with a supervisor who can help further."
    resolve_location: "I need a location to check the weather — where would you like me to look?"
    refine_query: "What would you like me to search for?"
    clarify_goal: "What would you like me to plan for you?"
    request_date_range: "What date range would you like to check?"
    trip_hard_constraint_gathering: "Before I can build your itinerary I need a few details: {trip_missing_hard}."
    trip_soft_constraint_gathering: "To build the best itinerary for your trip, could you share any of these: {trip_missing_soft}?"
    trip_planning: "Here's your itinerary for {trip_destination}. Let me know if you'd like any changes."
    default: "Let me help you with that."

  tool_call_policies:
    weather_lookup:
      -
        tool_id: weather_lookup
        payload:
          location: "{turn_data.location}"
          forecast_days: "{turn_data.forecast_days}"
    web_search:
      -
        tool_id: web_search
        payload:
          query: "{turn_data.query}"
          max_results: "{turn_data.max_results}"
    planning_create:
      -
        tool_id: planning_create
        payload:
          goal: "{turn_data.goal}"
          constraints: "{turn_data.constraints}"
          horizon_days: "{turn_data.horizon_days}"
          tool_results: "{turn_data.tool_results}"
    calendar_query:
      -
        tool_id: calendar_query
        payload:
          date_start: "{turn_data.date_start}"
          date_end: "{turn_data.date_end}"
    trip_plan_create:
      -
        tool_id: flight_search
        payload:
          origin: "{module_state.trip_origin_airport}"
          destination: "{module_state.trip_destination}"
          date_start: "{module_state.trip_date_start}"
          date_end: "{module_state.trip_date_end}"
          party_size: "{module_state.trip_party_size}"
      -
        tool_id: hotel_search
        payload:
          destination: "{module_state.trip_destination}"
          check_in: "{module_state.trip_date_start}"
          check_out: "{module_state.trip_date_end}"
          party_size: "{module_state.trip_party_size}"
          accommodation_style: "{module_state.trip_accommodation_style}"
          budget_usd: "{module_state.trip_budget_usd}"
      -
        tool_id: poi_search
        payload:
          destination: "{module_state.trip_destination}"
          categories: "{module_state.trip_activity_preferences}"
          max_results: 10
      -
        tool_id: restaurant_search
        payload:
          destination: "{module_state.trip_destination}"
          cuisine: "{module_state.trip_activity_preferences}"
          max_results: 5

# ── Adapter Bindings ──────────────────────────────────────────────────
adapters:
  state_builder:
    module_path: model-packs/assistant/controllers/runtime_adapters.py
    callable: build_initial_state
  domain_step:
    module_path: model-packs/assistant/controllers/runtime_adapters.py
    callable: domain_step
  turn_interpreter:
    module_path: model-packs/assistant/controllers/runtime_adapters.py
    callable: interpret_turn_input
  multi_task_turn_interpreter:
    module_path: model-packs/assistant/controllers/runtime_adapters.py
    callable: interpret_multi_task_input
  nlp_pre_interpreter:
    module_path: model-packs/assistant/controllers/nlp_pre_interpreter.py
    callable: nlp_preprocess
  escalation_context:
    module_path: model-packs/assistant/controllers/assistant_escalation_context.py
    callable: assistant_escalation_context
  tools:
    weather_lookup:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: weather_lookup_tool
    calendar_query:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: calendar_query_tool
    calendar_write:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: calendar_write_tool
    web_search:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: web_search_tool
    planning_create:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: planning_create_tool
    planning_update:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: planning_update_tool
    planning_list:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: planning_list_tool
    flight_search:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: flight_search_tool
    flight_status:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: flight_status_tool
    hotel_search:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: hotel_search_tool
    poi_search:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: poi_search_tool
    routing:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: routing_tool
    restaurant_search:
      module_path: model-packs/assistant/controllers/tool_adapters.py
      callable: restaurant_search_tool

# ── Operation Handlers ────────────────────────────────────────────────
operation_handlers:
  list_tasks:
    module_path: model-packs/assistant/controllers/assistant_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  view_task_history:
    module_path: model-packs/assistant/controllers/assistant_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  clear_task_history:
    module_path: model-packs/assistant/controllers/assistant_operations.py
    callable: handle_operation
    hitl_exempt: true
    min_role: user
  switch_active_module:
    module_path: model-packs/education/controllers/ops/modules.py
    callable: switch_active_module
    hitl_exempt: true
    min_role: user
