# version: 1.0.0
# last_updated: 2026-04-19
#
# Module: domain-authority (Governance)
# Extracted from runtime-config.yaml module_map entry:
#   domain/edu/domain-authority/v1

local_only: true

domain_physics_path: model-packs/education/modules/domain-authority/domain-physics.json
domain_system_prompt_path: model-packs/education/prompts/governance-persona-v1.md
turn_interpretation_prompt_path: model-packs/education/prompts/governance-turn-interpretation-spec-v1.md

ui_overrides:
  subtitle: "Domain Authority — Governance"

adapters:
  state_builder:
    module_path: model-packs/education/controllers/governance_adapters.py
    callable: build_governance_state
  domain_step:
    module_path: model-packs/education/controllers/governance_adapters.py
    callable: governance_domain_step
  turn_interpreter:
    module_path: model-packs/education/controllers/governance_adapters.py
    callable: interpret_turn_input
  nlp_pre_interpreter:
    module_path: model-packs/education/controllers/governance_nlp.py
    callable: governance_nlp_preprocess

turn_input_defaults:
  query_type: general
  target_component: null
  urgency: routine
  response_latency_sec: 5.0
  off_task_ratio: 0.0

turn_input_schema:
  query_type:
    type: enum
    values: [general, status_check, admin_command, module_management, escalation_review, physics_edit]
  target_component:
    type: string
    nullable: true
  urgency:
    type: enum
    values: [routine, elevated, critical]
