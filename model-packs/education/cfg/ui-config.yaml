# ── Education Domain — UI Configuration ───────────────────────────────
# Extracted from runtime-config.yaml.  The runtime loader auto-discovers
# this file (same directory, conventional name) and merges its keys into
# the runtime config.  Inline definitions in runtime-config.yaml take
# precedence if both files define the same top-level key.
#
# version: 1.0.0
# last_updated: 2026-04-19

ui_manifest:
  title: "Project Lumina"
  subtitle: "Education"
  domain_label: "Education"
  consent_heading: "Project Lumina"
  consent_text: "I am not grading you for a report card. I do not keep transcripts of what you say. If we get stuck, we ask for human help."
  consent_button_label: "I Agree to the Magic Circle"
  placeholder_text: "Type your steps here..."
  theme:
    primary: "oklch(0.45 0.08 220)"
    accent: "oklch(0.72 0.12 60)"
    background: "oklch(0.96 0.01 80)"

  # ── System-role → Domain-role mapping ──────────────────────
  # Education-specific role vocabulary.  Overrides the generic framework
  # defaults so that system roles map to education domain roles.
  system_role_to_domain_role:
    root: domain_authority
    admin: domain_authority
    super_admin: teacher
    operator: student
    half_operator: student
    user: student

  panels:
    - id: zpd_distribution
      label: "ZPD Distribution"
      endpoint: "/api/dashboard/education/zpd-distribution"
      roles: [root, admin, operator]
      type: chart
    - id: step_completion
      label: "Step Completion"
      endpoint: "/api/dashboard/education/step-completion"
      roles: [root, admin]
      type: metric
    - id: vocabulary_growth
      label: "Vocabulary Growth"
      endpoint: "/api/dashboard/education/vocabulary-growth"
      roles: [root, admin, teacher]
      type: chart

  # ── Role-based UI layouts ──────────────────────────────────
  # Each role gets a layout definition that controls which sidebar panels
  # and capabilities are available. `inherits` flattens the parent chain
  # so domain_authority sees everything teacher sees, plus its own panels.
  role_layouts:
    domain_authority:
      inherits: teacher
      sidebar_panels:
        - id: domain_overview
          label: "Domain Overview"
          component: DataPanel
          data_source: domain_overview
        - id: staff_directory
          label: "Staff Directory"
          component: DataPanel
          data_source: staff_directory
        - id: user_directory
          label: "User Directory"
          component: DataPanel
          data_source: user_directory
        - id: module_directory
          label: "Module Management"
          component: DataPanel
          data_source: module_directory
        - id: escalation_queue
          label: "Escalation Queue"
          component: EscalationQueue
        - id: system_log
          label: "System Log"
          component: SystemLogPanel
      capabilities:
        - assign_modules
        - manage_teachers
        - view_all_progress
        - resolve_escalations
        - test_as_role
    teacher:
      inherits: student
      sidebar_panels:
        - id: classroom
          label: "My Classroom"
          component: ClassroomPanel
        - id: managed_user_progress
          label: "Student Progress"
          component: DataPanel
          data_source: managed_user_progress
          source_path: educator_state.assigned_students
        - id: escalation_queue
          label: "Escalations"
          component: EscalationQueue
        - id: governed_modules
          label: "Module Assignments"
          component: DataPanel
          data_source: governed_modules
      capabilities:
        - assign_modules_to_students
        - view_student_progress
        - resolve_escalations
    teaching_assistant:
      inherits: student
      sidebar_panels:
        - id: managed_users
          label: "Assigned Students"
          component: DataPanel
          data_source: managed_users
          source_path: assistant_state.assigned_students
        - id: request_queue
          label: "Hint Queue"
          component: DataPanel
          data_source: empty_queue
      capabilities:
        - view_student_progress
        - issue_hints
    student:
      sidebar_panels:
        - id: self_profile
          label: "My Profile"
          component: DataPanel
          data_source: self_profile
        - id: self_modules
          label: "My Modules"
          component: DataPanel
          data_source: self_modules
        - id: self_preferences
          label: "Preferences"
          component: DataPanel
          data_source: self_preferences
      capabilities:
        - view_my_profile
        - view_available_modules
        - update_my_preferences
    parent:
      sidebar_panels:
        - id: managed_user_progress
          label: "My Child's Progress"
          component: DataPanel
          data_source: managed_user_progress
          source_path: guardian_state.assigned_children
        - id: notification_settings
          label: "Notification Settings"
          component: DataPanel
          data_source: notification_settings
          source_path: guardian_state.notification_preferences
      capabilities:
        - view_child_progress
        - manage_notifications

# ── Frontend UI contributions ─────────────────────────────
ui:
  plugin_bundle: model-packs/education/web/dist/plugin.js
  slash_commands:
    - name: teachers
      operation: list_users
      description: Show available teachers
      tier: user
    - name: join
      operation: request_teacher_assignment
      description: Request assignment to a teacher
      tier: user
    - name: students
      operation: list_users
      description: List your students
      tier: user
    - name: assign
      operation: assign_student
      description: Assign a student to your roster
      tier: user
    - name: assignmodules
      operation: assign_modules
      description: Assign learning modules to a student or classroom
      tier: user
